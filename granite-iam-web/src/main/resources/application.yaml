spring:
  application:
    name: Granite-IAM

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:granite_iam}
    username: ${POSTGRES_USER:granite}
    password: ${POSTGRES_PASSWORD:granite123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

