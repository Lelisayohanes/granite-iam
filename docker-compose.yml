services:
  postgres:
    image: postgres:16
    container_name: granite-iam-postgres

    restart: always

    environment:
      POSTGRES_DB: granite_iam
      POSTGRES_USER: granite
      POSTGRES_PASSWORD: granite123

    ports:
      - "5432:5432"
    redis:
      image: redis:7
      ports:
        - "6379:6379"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U granite -d granite_iam"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: